<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Adventure Storytelling Media</title>
    <script>
      // GitHub Pages SPA fallback (github.com/rafgraph/spa-github-pages).
      // GitHub serves this file for any unknown path (e.g. /repo/portfolio).
      // We encode the path and bounce to the app root so index.html can
      // restore it and wouter renders the right page.
      // pathSegmentsToKeep = 1 keeps the "/<repo-name>" project-page prefix.
      // For a custom-domain / root site, set this to 0.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
